[technology-description]
kj_laser=A compact turret assembled from restored blueprints of unknown origin. Its design achieves a solid balance between reliability and efficiency. The casing is built from readily available, yet carefully processed materials.

emergency-return=A pocket device for emergency return to the ship. When used, it instantly teleports you to the ship. However, quantum instability during the process results in the loss of up to 40% of your inventory!

exoskeleton-mk2-equipment=An exoskeleton utilizing warponium to enhance movement speed.

linked-heat-pipe=Allows creation of linked heat pipes that share the same temperature regardless of distance between them.

crystal-processing=Unlocks basic processing of exocine crystals, allowing extraction of valuable resources from anomalous formations.
crystal-processing-t2=Unlocks advanced exocine crystal processing technology. Increases extraction efficiency and product yield.

wdm-red-refined-concrete-bonus=Turrets placed on this surface gain +5% damage and fire rate.
warponium-solar-panel=Unlocks the Warponium Solar panel: an advanced solar panel that harnesses photochemical reactions in warponium to produce power even in very low light.

wdm_warp_drive_tech=With each technology level, the cost of maintaining a stable warp power core increases.

warponium-hypercube=A unique resource consisting of a compact cube of pure warponium. Its energy properties are so powerful and unstable that it can serve as both an incredibly efficient power source and a dangerous weapon.

ancient-drill=Unlocks a giant drill specialized in extracting warponium. A monumental complex engineered for extreme environments where even desperate measures are no longer enough to pierce the bedrock.