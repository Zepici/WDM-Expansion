[technology-description]
kj_laser=A compact turret assembled from restored blueprints of unknown origin. Its design achieves a solid balance between reliability and efficiency. The casing is built from readily available, yet carefully processed materials.

emergency-return=A pocket device for emergency return to the ship. When used, it instantly teleports you to the ship. However, quantum instability during the process results in the loss of up to 50% of your inventory!

exoskeleton-mk2-equipment=An exoskeleton utilizing varponium to enhance movement speed.

linked-heat-pipe=Allows creation of linked heat pipes that share the same temperature regardless of distance between them.

crystal-processing=Unlocks basic processing of exocine crystals, allowing extraction of valuable resources from anomalous formations.
crystal-processing-t2=Unlocks advanced exocine crystal processing technology. Increases extraction efficiency and product yield.