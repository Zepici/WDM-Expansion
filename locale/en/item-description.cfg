pamk3-esmk3=Provides an energy shield to protect the player.
pamk3-se=Provides power for equipment modules.
pamk3-inff=Effectively infinite fuel source.
pamk3-pdd=Damages, pushes back and stuns nearby enemies automatically.

exoskeleton-mk2-equipment=An exoskeleton utilizing warponium to enhance movement speed.

crystal=An anomalous extraterrestrial crystalline formation with unique energy and chemical properties.
charged-crystal=A monumental alien crystal that generates immense amounts of pure energy, capable of powering the most complex planetary mechanisms.

wdm-red-refined-concrete-bonus=Turrets placed on this surface gain +5% damage and fire rate.
warponium-solar-panel=An enhanced warponium-infused version of the solar panel. When irradiated, warponium undergoes a photochemical reaction, releasing its stored energy. Thanks to the substance's unique properties, the panel produces decent power even in very low light.

warponium-hypercube=A unique resource consisting of a compact cube of pure warponium.

ancient-drill=Giant drill specialized in warponium extraction.

wdm-ship-abilities-console=Additional onboard console for using new WDM Expansion ship abilities.\nRequires a direct connection to a [item=warponium-storage-tank] with [fluid=warponium-fluid].
warponium-storage-tank=Miniature tank designed to supply fuel to the Ship Abilities Sub-Console.
