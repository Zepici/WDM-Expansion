kj_electric_laser_player=A compact turret assembled from restored blueprints of unknown origin. Its design achieves a solid balance between reliability and efficiency. The casing is built from readily available, yet carefully processed materials.

emergency-return=A pocket device for emergency return to the ship. When used, it instantly teleports you to the ship. However, quantum instability during the process results in the loss of up to 50% of your inventory!

exoskeleton-mk2-equipment=An exoskeleton utilizing varponium to enhance movement speed.

crystal=An anomalous extraterrestrial crystalline formation with unique energy and chemical properties.
