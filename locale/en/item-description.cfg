kj_electric_laser_player=A compact turret assembled from restored blueprints of unknown origin. Its design achieves a solid balance between reliability and efficiency. The casing is built from readily available, yet carefully processed materials.

emergency-return=A pocket device for emergency return to the ship. When used, it instantly teleports you to the ship. Quantum instability causes inventory loss, reduced by capsule quality.
wdm-emergency-return-loss-label=Inventory loss
wdm-emergency-return-loss-50=40%
