[mod-setting-description]
wdm-expansion-event-enable=Adds new events and encounters for WarpDriveMachine.\n[font=default-bold][color=purple]Ship scanners report that this feature is still under development! May cause lag or game crashes.[/color][/font]
wdm-expansion-debug=Enables developer mode
wdm-expansion-zombie=Optimizes the zombie faction by reducing the maximum number of units per spawner and lowering their spawn rate, while proportionally increasing unit stats.
wdm-expansion-disable-friendly-fire=Disables friendly fire for all factions: slightly improves performance and enhances mod mechanics.
