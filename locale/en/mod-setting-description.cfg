[mod-setting-description]
wdm-expansion-event-enable=Adds new events and encounters for WarpDriveMachine.\n[font=default-bold][color=purple]Ship scanners report that this feature is still under development! May cause lag or game crashes.[/color][/font]
wdm-expansion-debug=Enables developer mode
wdm-expansion-zombie=Optimizes the zombie faction by reducing the maximum number of units per spawner and lowering their spawn rate, while proportionally increasing unit stats.
wdm-expansion-disable-friendly-fire=Disables friendly fire for pirate and enemy factions: slightly optimizes the game and improves mod mechanics performance.
wdm-expansion-show-turret-buff-text=Shows floating text/label when turret receives red refined concrete buff.
wdm-expansion-pirate-event-boost=This setting sends a series of insults to the pirate captain, turning your sector into a war zone and vastly increasing the density of pirate fleets. Starships will attack in wave after wave, turning space into a non-stop barrage of fire! Use for testing only
