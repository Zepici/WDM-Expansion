kj_electric_laser_player=A compact turret assembled from restored blueprints of unknown origin. Its design strikes a successful balance between reliability and efficiency. The casing is built from readily available, yet carefully processed materials.

linked-heat-pipe=Allows heat transfer between all linked heat pipes of the same type, regardless of distance. All pipes of the same type share the same temperature.

crystal=An anomalous extraterrestrial crystalline formation with unique energy and chemical properties.