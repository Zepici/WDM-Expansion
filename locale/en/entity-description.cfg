[entity-description]

kj_electric_laser_t1=A bulky, hastily assembled cannon. Its frame consists of crudely welded casings from stolen ship capacitors and fragments of armored plating. Before firing, the entire structure vibrates, emitting an irritating hum and the sharp smell of ozone.
