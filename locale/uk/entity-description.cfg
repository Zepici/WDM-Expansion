kj_electric_laser_player=Компактна турель, зібрана за відновленими кресленнями невідомого походження. Її конструкція вдало поєднує надійність та ефективність. Корпус зібрано з доступних, але якісно оброблених матеріалів.
kj_electric_laser_mini=Компактний, ледь гучний «обрубок» повноцінної лазерної гармати. Щоб штатний генератор піратського корабля не згорів уже під час першого залпу, самоучки-інженери безжально вкоротили випромінювач і викинули важку систему охолодження. Корпус гармати - це криво зварені коробки від крадених конденсаторів і шматки бронеплит, які ледь утримують гучну начинку.

linked-heat-pipe=Дозволяє передавати тепло між усіма пов'язаними тепловими трубами одного типу незалежно від відстані. Усі труби одного типу мають спільну температуру.

entity-crystal=Аномальне інопланетне кристалічне утворення з унікальними енергетичними та хімічними властивостями.
big-crystal=Монументальний інопланетний кристал, що синтезує неймовірні обсяги чистої енергії та здатний живити найскладніші планетарні механізми.

conversion-plant=Багатофункціональна промислова установка, призначена для глибокої переробки [font=default-bold][color=purple]варпонію[/color][/font]. Використовує термохімічні процеси та контрольовані реакції окиснення для перетворення сировини на промислові матеріали.
solar-matrix=Покращена варпонієм версія сонячної панелі. Під час опромінення варпоній вступає у фотохімічну реакцію, вивільняючи власні запаси енергії. Завдяки унікальним властивостям речовини панель виробляє пристойну потужність навіть за надзвичайно слабкого освітлення.