kj_electric_laser_t1=Громіздка гармата, зібрана нашвидкуруч. Корпус складається з криво зварених коробів від вкрадених корабельних конденсаторів і шматків броньованої обшивки. Перед пострілом уся конструкція вібрує, видаючи нав'язливий гул і запах озону.
