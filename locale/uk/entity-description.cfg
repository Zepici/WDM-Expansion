kj_electric_laser_player=Компактна турель, зібрана за відновленими кресленнями невідомого походження. Її конструкція вдало поєднує надійність та ефективність. Корпус зібрано з доступних, але якісно оброблених матеріалів.

linked-heat-pipe=Дозволяє передавати тепло між усіма пов'язаними тепловими трубами одного типу незалежно від відстані. Усі труби одного типу мають спільну температуру.

crystal=Аномальне інопланетне кристалічне утворення з унікальними енергетичними та хімічними властивостями.
