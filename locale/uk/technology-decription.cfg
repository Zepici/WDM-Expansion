[technology-description]
kj_laser=Компактна турель, зібрана за відновленими кресленнями невідомого походження. Її конструкція вдало поєднує надійність та ефективність. Корпус зібрано з доступних, але якісно оброблених матеріалів.

emergency-return=Кишеньковий пристрій для екстреного повернення до корабля. Під час використання миттєво телепортує вас на корабель, але квантова нестабільність процесу може призвести до втрати до 40% інвентарю!

exoskeleton-mk2-equipment=Екзоскелет, що використовує варпоній для збільшення швидкості пересування.

linked-heat-pipe=Дозволяє створювати пов'язані теплові труби, які мають спільну температуру незалежно від відстані між ними.

crystal-processing=Розблоковує базову переробку екзоцинових кристалів, що дозволяє отримувати цінні ресурси з аномальних утворень.
crystal-processing-t2=Розблоковує вдосконалену технологію переробки екзоцинових кристалів. Підвищує ефективність екстракції та вихід продуктів.

wdm-red-refined-concrete-bonus=Турелі, розміщені на цьому покритті, отримують +5% до шкоди та скорострільності.