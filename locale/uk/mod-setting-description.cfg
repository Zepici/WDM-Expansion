[mod-setting-description]
wdm-expansion-event-enable=Додає нові івенти та події для WarpDriveMachine. \n[font=default-bold][color=purple]Сканери корабля повідомляють, що ця функція ще в розробці! Може спричинити лаги або краші гри.[/color][/font]
wdm-expansion-debug=Увімкнути режим розробника
wdm-expansion-zombie=Оптимізація фракції зомбі шляхом зменшення максимальної кількості юнітів на один спавнер і зниження швидкості їх появи з пропорційним підвищенням характеристик юнітів.
wdm-expansion-disable-friendly-fire=Вимкнення дружнього вогню для фракцій pirate та enemy: незначно оптимізує гру та покращує роботу механік мода.
wdm-expansion-show-turret-buff-text=Показує напис і спливаючий текст, коли турель отримує баф від червоного покращеного бетону.
wdm-expansion-pirate-event-boost=Це налаштування відправляє піратському капітану кілька образ, тим самим перетворюючи ваш сектор на зону бойових дій і в рази збільшуючи щільність піратських флотів. Космічні кораблі атакуватимуть хвиля за хвилею, перетворюючи космос на суцільний загороджувальний вогонь! Використовуйте лише для тестів
