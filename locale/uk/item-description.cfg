kj_electric_laser_player=Компактна турель, зібрана за відновленими кресленнями невідомого походження. Її конструкція вдало поєднує надійність та ефективність. Корпус зібрано з доступних, але якісно оброблених матеріалів.

emergency-return=Кишеньковий пристрій для екстреного повернення до корабля. Під час використання миттєво телепортує вас на корабель. Квантова нестабільність спричиняє втрати інвентарю, але що вища якість капсули, то менші втрати.
wdm-emergency-return-loss-label=Втрата інвентарю
wdm-emergency-return-loss-50=40%
wdm-emergency-return-loss-45=35%
wdm-emergency-return-loss-40=30%
wdm-emergency-return-loss-35=25%
wdm-emergency-return-loss-25=15%

pamk3-esmk3=Створює енергетичний щит для захисту гравця.
pamk3-se=Забезпечує енергією модульне обладнання.
pamk3-inff=Фактично нескінченне джерело палива.
pamk3-pdd=Завдає шкоди, відштовхує та паралізує ворогів поряд. Працює автоматично.

exoskeleton-mk2-equipment=Екзоскелет, що використовує варпоній для збільшення швидкості пересування.

crystal=Аномальне інопланетне кристалічне утворення з унікальними енергетичними та хімічними властивостями.
charged-crystal=Монументальний інопланетний кристал, що синтезує неймовірні обсяги чистої енергії та здатний живити найскладніші планетарні механізми.

wdm-red-refined-concrete-bonus=Турелі, розміщені на цьому покритті, отримують +5% до шкоди та скорострільності.
warponium-solar-panel=Покращена варпонієм версія сонячної панелі. Під час опромінення варпоній вступає у фотохімічну реакцію, вивільняючи власні запаси енергії. Завдяки унікальним властивостям речовини панель виробляє пристойну потужність навіть за надзвичайно слабкого освітлення.

warponium-hypercube=Унікальний ресурс, що являє собою компактний куб із чистого варпонію.

ancient-drill=Гігантський бур, спеціалізований на видобутку варпонію.

wdm-ship-abilities-console=Додаткова бортова консоль для використання нових здібностей корабля мода WDM Expansion.\nДля роботи потребує прямого підключення до [item=warponium-storage-tank] з [fluid=warponium-fluid].
warponium-storage-tank=Мініатюрний резервуар, призначений для передачі палива до консолі здібностей корабля.