[wdm-expansion]
ship-abilities-header=Здібності Корабля
ship-abilities-console-no-ship-interior=Суб-консоль здібностей корабля можна побудувати ТІЛЬКИ на поверхні корабля!
ship-surface-not-found=Поверхня корабля не знайдена!

#НЕЗРИМІСТЬ КОРАБЛЯ
ship-ability-cloak=Незримість корабля
ship-ability-cloak-description=Створює маскувальну хвилю, яка зламує протоколи ворожих турелей і вводить в оману інстинкти фауни. Усі загрози тимчасово сприймають вас як дружній об'єкт.
cloak-activated=Маскування активне! Загрози розпізнають корабель як союзний.
cloak-deactivated=Маскування деактивовано.

#ЗБИРАЧ РЕСУРСІВ
ship-ability-resource-collector=Збирач ресурсів
ship-ability-resource-collector-description=Сканує поверхню планети та миттєво переміщує весь лут у контейнери сховища корабля.
resource-collector-collected=Зібрано __1__ предметів з поверхні планети.
resource-collector-no-chests=На кораблі не знайдено сховищ!
resource-collector-no-items-on-ground=На поверхні планети немає предметів для збору!
resource-collector-target-selected=Цільова скриня: __1__ на __2__
resource-collector-target-not-selected=Цільову скриню не обрано!

#РОЗГІН РЕАКТОРІВ
ship-ability-reactor-boost=Розгін реакторів
ship-ability-reactor-boost-description=Розігріває всі реактори корабля до 800°C, максимізуючи вироблення електроенергії.
reactor-boost-activated=Розгін реактора активовано! __1__ реакторів розігріто до 800°C.
reactor-boost-no-reactors=На кораблі не знайдено реакторів для розгону!

#КРІО-ЗАМОРОЗКА
ship-ability-cryo-freeze=Кріо-заморозка
ship-ability-cryo-freeze-description=Робить усіх гравців невразливими на деякий час, але блокує рух.
cryo-freeze-activated=Кріо-заморозку активовано! Заморожено __1__ гравців.
cryo-freeze-deactivated=Кріо-заморозку деактивовано.
cryo-freeze-no-players=На кораблі немає гравців для заморозки!

#КВАНТОВИЙ РОЗПОДІЛЬНИК БОЄПРИПАСІВ
ship-ability-ammo-distributor=Квантовий розподільник боєприпасів
ship-ability-ammo-distributor-description=Сканує всі турелі корабля та автоматично поповнює їх боєприпасами зі сховищ.
ammo-distributor-restocked=Поповнено боєприпасами __1__ турелей.
ammo-distributor-no-chests=Не знайдено джерела сховища для боєприпасів!
ammo-distributor-no-turrets=На кораблі не знайдено турелей для поповнення!
ammo-distributor-no-ammo=У сховищах не знайдено боєприпасів для розподілу!

#УТИЛІЗАТОР ВІДХОДІВ КОРАБЛЯ
ship-ability-waste-recycler=Утилізатор відходів корабля
ship-ability-waste-recycler-description=Переробляє 100 одиниць сміття з логістичної мережі на чисту енергію.
waste-recycler-converted=Перероблено __1__ одиниць сміття на чисту енергію.
waste-recycler-no-items=Немає предметів для переробки!

