[technology-description]
kj_laser=Une tourelle compacte assemblée d'après des plans restaurés d'origine inconnue. Sa conception offre un bon équilibre entre fiabilité et efficacité. La coque est fabriquée à partir de matériaux accessibles mais soigneusement traités.

emergency-return=Un dispositif de poche pour retourner d'urgence au vaisseau. Lors de l'utilisation, il vous téléporte instantanément vers le vaisseau, mais l'instabilité quantique du processus peut entraîner la perte de jusqu'à 40 % de l'inventaire !

exoskeleton-mk2-equipment=Un exosquelette utilisant du warponium pour augmenter la vitesse de déplacement.

linked-heat-pipe=Permet de créer des tuyaux thermiques liés qui partagent la même température quelle que soit la distance qui les sépare.

crystal-processing=Débloque le traitement de base des cristaux exocins, permettant d'extraire des ressources précieuses à partir de formations anormales.
crystal-processing-t2=Débloque une technologie avancée de traitement des cristaux exocins. Améliore l'efficacité d'extraction et le rendement des produits.

wdm-red-refined-concrete-bonus=Les tourelles placées sur ce revêtement bénéficient de +5 % de dégâts et de cadence de tir.