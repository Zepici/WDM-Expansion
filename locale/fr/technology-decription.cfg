[technology-description]
kj_laser=Une tourelle compacte assemblee d'apres des plans restaurees d'origine inconnue. Sa conception offre un bon equilibre entre fiabilite et efficacite. La coque est fabriquee a partir de materiaux accessibles mais soigneusement traites.

emergency-return=Un dispositif de poche pour retourner d'urgence au vaisseau. Lors de l'utilisation, il vous teleporte instantanement vers le vaisseau, mais l'instabilite quantique du processus peut entrainer la perte de jusqu'a 50% de l'inventaire !

exoskeleton-mk2-equipment=Un exosquelette utilisant du warponium pour augmenter la vitesse de deplacement.

linked-heat-pipe=Permet de creer des tuyaux thermiques lies qui partagent la meme temperature quelle que soit la distance qui les separe.

crystal-processing=Debloque le traitement de base des cristaux exocines, permettant d'extraire des ressources precieuses a partir de formations anormales.
crystal-processing-t2=Debloque une technologie avancee de traitement des cristaux exocines. Ameliore l'efficacite d'extraction et le rendement des produits.

