[mod-setting-description]
wdm-expansion-event-enable=Ajoute de nouveaux evenements et rencontres pour WarpDriveMachine. \n[font=default-bold][color=purple]Les scanners du vaisseau indiquent que cette fonctionnalite est encore en developpement ! Peut provoquer des ralentissements ou des crashs du jeu.[/color][/font]
wdm-expansion-debug=Active le mode developpeur
wdm-expansion-zombie=Optimise la faction zombie en reduisant le nombre maximal d'unites par generateur et leur vitesse d'apparition, avec une augmentation proportionnelle des caracteristiques des unites.
wdm-expansion-disable-friendly-fire=Desactive les degats allies pour toutes les factions : optimise legerement le jeu et ameliore le fonctionnement des mecaniques du mod.
wdm-expansion-show-turret-buff-text=Affiche une inscription et un texte flottant lorsque la tourelle recoit le bonus du beton rouge ameliore.
