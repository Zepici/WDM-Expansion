[mod-setting-description]
wdm-expansion-pirate-event-boost=Ce paramètre envoie une série d'insultes au capitaine pirate, transformant votre secteur en zone de guerre et augmentant considérablement la densité des flottes pirates. Les vaisseaux spatiaux attaqueront vague après vague, transformant l'espace en un véritable barrage de feu continu! Activer uniquement à des fins de test.