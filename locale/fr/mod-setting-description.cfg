[mod-setting-description]
wdm-expansion-event-enable=Ajoute de nouveaux événements et rencontres pour WarpDriveMachine. \n[font=default-bold][color=purple]Les scanners du vaisseau indiquent que cette fonctionnalité est encore en développement ! Peut provoquer des ralentissements ou des crashs du jeu.[/color][/font]
wdm-expansion-debug=Active le mode développeur
wdm-expansion-zombie=Optimise la faction zombie en réduisant le nombre maximal d'unités par générateur et leur vitesse d'apparition, avec une augmentation proportionnelle des caractéristiques des unités.
wdm-expansion-disable-friendly-fire=Désactive les dégâts alliés pour toutes les factions : optimise légèrement le jeu et améliore le fonctionnement des mécaniques du mod.
wdm-expansion-show-turret-buff-text=Affiche une inscription et un texte flottant lorsque la tourelle reçoit le bonus du béton rouge amélioré.