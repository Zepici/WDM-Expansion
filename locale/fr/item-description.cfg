kj_electric_laser_player=Une tourelle compacte assemblée d'après des plans restaurés d'origine inconnue. Sa conception offre un bon équilibre entre fiabilité et efficacité. La coque est fabriquée à partir de matériaux accessibles mais soigneusement traités.

emergency-return=Un dispositif de poche pour retourner d'urgence au vaisseau. Lors de l'utilisation, il vous téléporte instantanément vers le vaisseau. L'instabilité quantique entraîne des pertes d'inventaire, réduites selon la qualité de la capsule.
wdm-emergency-return-loss-label=Perte d'inventaire
wdm-emergency-return-loss-50=40 %
wdm-emergency-return-loss-45=35 %
wdm-emergency-return-loss-40=30 %
wdm-emergency-return-loss-35=25 %
wdm-emergency-return-loss-25=15 %

exoskeleton-mk2-equipment=Un exosquelette utilisant du warponium pour augmenter la vitesse de déplacement.

crystal=Une formation cristalline extraterrestre anormale aux propriétés énergétiques et chimiques uniques.

wdm-red-refined-concrete-bonus=Les tourelles placées sur ce revêtement bénéficient de +5 % de dégâts et de cadence de tir.