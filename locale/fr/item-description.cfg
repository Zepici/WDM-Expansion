[item-description]

kj_electric_laser_t1=Un canon massif assemble a la hate. Sa coque est constituee de boitiers soudes de travers provenant de condensateurs de vaisseau voles, ainsi que de morceaux de blindage. Avant le tir, toute la structure vibre en emettant un bourdonnement agacant et une odeur d'ozone.
