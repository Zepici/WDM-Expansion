kj_electric_laser_player=Une tourelle compacte assemblee d'apres des plans restaurees d'origine inconnue. Sa conception offre un bon equilibre entre fiabilite et efficacite. La coque est fabriquee a partir de materiaux accessibles mais soigneusement traites.
kj_electric_laser_mini=Une version compacte et à peine vrombissante d’un canon laser à part entière. Pour éviter que le générateur d’origine de ce rafiot pirate ne grille dès le premier tir, des ingénieurs autodidactes ont impitoyablement raccourci l’émetteur et se sont débarrassés du lourd système de refroidissement. Le boîtier du canon est constitué de boîtes de condensateurs volés soudées de travers et de morceaux de plaques de blindage qui retiennent à peine le mécanisme vrombissant.

linked-heat-pipe=Permet de transferer la chaleur entre tous les tuyaux thermiques lies du meme type, quelle que soit la distance. Tous les tuyaux du meme type partagent la meme temperature.

crystal=Une formation cristalline extraterrestre anormale aux proprietes energetiques et chimiques uniques.
