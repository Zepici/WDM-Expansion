kj_electric_laser_player=Une tourelle compacte assemblée d’après des plans restaurés d’origine inconnue. Sa conception offre un bon équilibre entre fiabilité et efficacité. La coque est fabriquée à partir de matériaux accessibles mais soigneusement traités.

kj_electric_laser_mini=Une version compacte et à peine vrombissante d’un canon laser à part entière. Pour éviter que le générateur d’origine de ce rafiot pirate ne grille dès le premier tir, des ingénieurs autodidactes ont impitoyablement raccourci l’émetteur et supprimé le lourd système de refroidissement. Le boîtier du canon est constitué de boîtiers de condensateurs volés soudés de travers et de morceaux de plaques de blindage qui retiennent à peine le mécanisme vrombissant.

linked-heat-pipe=Permet de transférer la chaleur entre tous les tuyaux thermiques liés du même type, quelle que soit la distance. Tous les tuyaux du même type partagent la même température.

crystal=Une formation cristalline extraterrestre anormale aux propriétés énergétiques et chimiques uniques.