[entity-description]

kj_electric_laser_t1=Un canon massif assemblé à la hâte. Sa coque est constituée de boîtiers soudés de travers provenant de condensateurs de vaisseaux volés, ainsi que de morceaux de blindage. Avant le tir, toute la structure vibre en émettant un bourdonnement agaçant et une odeur d’ozone.
