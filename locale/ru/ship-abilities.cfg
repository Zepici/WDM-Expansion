[wdm-expansion]
ship-abilities-header=Способности Корабля
ship-abilities-console-no-ship-interior=Суб-консоль способностей корабля можно построить ТОЛЬКО на поверхности корабля!
ship-surface-not-found=Поверхность корабля не найдена!

#НЕВИДИМОСТЬ КОРАБЛЯ
ship-ability-cloak=Невидимость корабля
ship-ability-cloak-description=Создаёт маскировочную волну, которая взламывает протоколы вражеских турелей и вводит в заблуждение инстинкты фауны. Все угрозы временно начинают воспринимать вас как дружественный объект.
cloak-activated=Маскировка активна! Угрозы распознают корабль как союзный.
cloak-deactivated=Маскировка деактивирована.

#СБОРЩИК РЕСУРСОВ
ship-ability-resource-collector=Сборщик ресурсов
ship-ability-resource-collector-description=Сканирует поверхность планеты и мгновенно перемещает весь лут в контейнеры хранилища корабля.
resource-collector-collected=Собрано __1__ предметов с поверхности планеты.
resource-collector-no-chests=На корабле не найдено хранилищ!
resource-collector-no-items-on-ground=На поверхности планеты нет предметов для сбора!
resource-collector-target-selected=Целевой сундук: __1__ на __2__
resource-collector-target-not-selected=Целевой сундук не выбран!

#РАЗГОН РЕАКТОРОВ
ship-ability-reactor-boost=Разгон реакторов
ship-ability-reactor-boost-description=Разогревает все реакторы корабля до 800°C, максимизируя выработку электроэнергии.
reactor-boost-activated=Разгон реактора активирован! __1__ реакторов разогрето до 800°C.
reactor-boost-no-reactors=На корабле не найдено реакторов для разгона!

#КРИО-ЗАМОРОЗКА
ship-ability-cryo-freeze=Крио-заморозка
ship-ability-cryo-freeze-description=Делает всех игроков неуязвимыми на некоторое время, но блокирует движение.
cryo-freeze-activated=Крио-заморозка активирована! Заморожено __1__ игроков.
cryo-freeze-deactivated=Крио-заморозка деактивирована.
cryo-freeze-no-players=На корабле нет игроков для заморозки!

#КВАНТОВЫЙ РАСПРЕДЕЛИТЕЛЬ БОЕПРИПАСОВ
ship-ability-ammo-distributor=Квантовый распределитель боеприпасов
ship-ability-ammo-distributor-description=Сканирует все турели корабля и автоматически пополняет их боеприпасами из хранилищ.
ammo-distributor-restocked=Пополнено боеприпасами __1__ турелей.
ammo-distributor-no-chests=Не найдено источника хранилища для боеприпасов!
ammo-distributor-no-turrets=На корабле не найдено турелей для пополнения!
ammo-distributor-no-ammo=В хранилищах не найдено боеприпасов для распределения!

#УТИЛИЗАТОР ОТХОДОВ КОРАБЛЯ
ship-ability-waste-recycler=Утилизатор отходов корабля
ship-ability-waste-recycler-description=Перерабатывает 100 единиц мусора из логистической сети в чистую энергию.
waste-recycler-converted=Переработано __1__ единиц мусора в чистую энергию.
waste-recycler-no-items=Нет предметов для переработки!

#ИНТЕРФЕЙС, ОГРАНИЧЕНИЯ И КНОПКИ
ability-button-activate=Aктивировать
ability-button-locked=Заблокирована
chest-selector-button=Выбрать контейнер
chest-selector-target-set=Целевой контейнер установлен!
chest-selector-click-on-chest=Кликните на нужный контейнер для установки его как целевого.

