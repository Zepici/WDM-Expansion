[mod-setting-description]
wdm-expansion-event-enable=Добавляет новые ивенты и события для WarpDriveMachine. \n[font=default-bold][color=purple]Сканеры корабля выяснили, что функция находится в разработке! Может вызвать лаги/краш игры.[/color][/font] 
wdm-expansion-debug=Включает режим разработчика
wdm-expansion-zombie=Оптимизация фракции зомби за счёт снижения максимального числа юнитов на один спавнер и уменьшения скорости их появления, с пропорциональным повышением характеристик юнитов.
wdm-expansion-disable-friendly-fire=Отключение дружественного урона для фракций pirate и enemy: незначительно оптимизирует игру и улучшает работу механик мода.
wdm-expansion-show-turret-buff-text=Показывает надпись и всплывающий текст, когда турель получает бафф от красного улучшенного бетона.
wdm-expansion-pirate-event-boost=Эта настройка отправляет на борт пиратского капитана несколько оскорблений, тем самым превращая ваш сектор в зону боевых действий, в разы увеличивая плотность пиратских флотов. Космические корабли будут атаковать волна за волной, превращая космос в сплошной заградительный огонь! Используйте только для тестов.