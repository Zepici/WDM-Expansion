[technology-description]

pamk3-esmk3=Вставляется в броню для поглощения огромного количества урона.
pamk3-se=Вставляется в броню для питания другого снаряжения или преобразуется, чтобы служить источником топлива.
pamk3-pdd=Вставьте в броню для автоматического нанесения урона, отталкивания и парализовывания находящихся рядом врагов.

kj_laser=Компактная турель, собранная по восстановленным чертежам неизвестного происхождения. Её конструкция - удачный баланс между надёжностью и эффективностью. Корпус, собран из доступных, но качественно обработанных материалов.

emergency-return=Карманное устройство для экстренного возврата к кораблю. При использовании мгновенно телепортирует вас на корабль, однако квантовая нестабильность процесса приводит к утрате до 40% инвентаря!

exoskeleton-mk2-equipment=Экзоскелет, использующий варпоний для увеличения скорости перемещения.

linked-heat-pipe=Позволяет создавать связанные тепловые трубы, которые имеют общую температуру независимо от расстояния между ними.

crystal-processing=Разблокирует базовую переработку экзоциновых кристаллов, позволяя получать ценные ресурсы из аномальных образований.
crystal-processing-t2=Разблокирует усовершенствованную технологию переработки экзоциновых кристаллов. Повышает эффективность экстракции и выход продуктов.

wdm-red-refined-concrete-bonus=Турели, размещённые на этом покрытии, получают +5% к урону и скорострельности.
warponium-solar-panel=Разблокирует Варпониевую солнечную панель - усовершенствованную версию солнечной панели, которая генерирует энергию даже при слабом освещении за счёт фотохимической реакции варпония.

wdm_warp_drive_tech=С каждым уровнем технологии затраты на обеспечение стабильной работы варп-энергоядра увеличиваются.

warponium-hypercube=Уникальный ресурс, представляющий собой компактный куб из чистого варпония. Его энергетические свойства настолько мощные и нестабильные, что он может служить как невероятно эффективным источником энергии, так и опасным оружием.

ancient-drill=Разблокирует гигантский бур, специализированный на добыче варпония и созданный для тех зон, где даже крайних мер стало недостаточно для пробития коренной породы.

wdm-ship-abilities-console=Разблокирует возможность строительства дополнительной консоли способностей корабля для использования новых способностей WDM Expansion.\nСвязывается с [item=warponium-storage-tank] для получения топлива.

wdm-ship-ability-cloak=Делает все сооружения на вашем корабле временно невидимыми для врагов.
wdm-ship-ability-resource-collector=Автоматически собирает весь лут с поверхности планеты.
wdm-ship-ability-reactor-boost=Резко увеличивает выработку реакторов путём их нагрева до оптимальной температуры.
wdm-ship-ability-cryo-freeze=Защищает игроков от урона, но временно блокирует перемещение.
wdm-ship-ability-ammo-distributor=Автоматически пополняет боеприпасы во всех турелях на корабле, используя имеющиеся ресурсы.
wdm-ship-ability-waste-recycler=Преобразует скопившиеся отходы в чистую энергию.