kj_electric_laser_player=Компактная турель, собранная по восстановленным чертежам неизвестного происхождения. Её конструкция - удачный баланс между надёжностью и эффективностью. Корпус, собран из доступных, но качественно обработанных материалов.

emergency-return=Карманное устройство для экстренного возврата к кораблю. При использовании мгновенно телепортирует вас на корабль. Квантовая нестабильность приводит к потерям инвентаря, но чем выше качество капсулы, тем меньше потери.
