kj_electric_laser_player=Компактная турель, собранная по восстановленным чертежам неизвестного происхождения. Её конструкция - удачный баланс между надёжностью и эффективностью. Корпус, собран из доступных, но качественно обработанных материалов.

emergency-return=Карманное устройство для экстренного возврата к кораблю. При использовании мгновенно телепортирует вас на корабль. Квантовая нестабильность приводит к потерям инвентаря, но чем выше качество капсулы, тем меньше потери.
wdm-emergency-return-loss-label=Потеря инвентаря
wdm-emergency-return-loss-50=40%
wdm-emergency-return-loss-45=35%
wdm-emergency-return-loss-40=30%
wdm-emergency-return-loss-35=25%
wdm-emergency-return-loss-25=15%

pamk3-esmk3=Создаёт энергетический щит для защиты игрока.
pamk3-se=Обеспечивает энергией модульное оборудование.
pamk3-inff=Фактически бесконечный источник топлива.
pamk3-pdd=Наносит урон, отталкивает и парализует находящихся рядом врагов. Работает автоматически.

exoskeleton-mk2-equipment=Экзоскелет, использующий варпоний для увеличения скорости перемещения.

crystal=Аномальное инопланетное кристаллическое образование с уникальными энергетическими и химическими свойствами.
charged-crystal=Монументальный инопланетный кристалл, синтезирующий невероятные объемы чистой энергии, способный питать сложнейшие планетарные механизмы.

wdm-red-refined-concrete-bonus=Турели, размещённые на этом покрытии, получают +5% к урону и скорострельности.
warponium-solar-panel=Улучшенная варпонием версия солнечной панели. При облучении варпоний вступает в фотохимическую реакцию, высвобождая собственные запасы энергии. Благодаря уникальным свойствам вещества, панель выдает неплохую мощность даже при крайне слабом освещении.

warponium-hypercube=Уникальный ресурс, представляющий собой компактный куб из чистого варпония.

ancient-drill=Гигантский бур, специализированный на добыче варпония.

wdm-ship-abilities-console=Дополнительная бортовая консоль для использования новых способностей корабля мода WDM Expansion.\nДля работы требует прямого подключения к [item=warponium-storage-tank] с [fluid=warponium-fluid].
warponium-storage-tank=Миниатюрный резервуар, предназначенный для передачи топлива в консоль способностей корабля.